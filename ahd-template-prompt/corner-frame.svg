<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Outer L -->
  <line x1="2" y1="2" x2="58" y2="2" stroke="#C4954A" stroke-width="0.9" opacity="0.6"/>
  <line x1="2" y1="2" x2="2"  y2="58" stroke="#C4954A" stroke-width="0.9" opacity="0.6"/>
  <!-- Inner L offset -->
  <line x1="10" y1="10" x2="46" y2="10" stroke="#C4954A" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="10" x2="10" y2="46" stroke="#C4954A" stroke-width="0.5" opacity="0.3"/>
  <!-- Corner diamond -->
  <rect x="-3" y="-3" width="10" height="10" transform="rotate(45 2 2)" fill="#C4954A" opacity="0.8"/>
  <!-- Tick marks outer horizontal -->
  <line x1="18" y1="0" x2="18" y2="5"  stroke="#C4954A" stroke-width="0.7" opacity="0.4"/>
  <line x1="34" y1="0" x2="34" y2="4"  stroke="#C4954A" stroke-width="0.5" opacity="0.28"/>
  <line x1="50" y1="0" x2="50" y2="4"  stroke="#C4954A" stroke-width="0.5" opacity="0.2"/>
  <!-- Tick marks outer vertical -->
  <line x1="0" y1="18" x2="5"  y2="18" stroke="#C4954A" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="34" x2="4"  y2="34" stroke="#C4954A" stroke-width="0.5" opacity="0.28"/>
  <line x1="0" y1="50" x2="4"  y2="50" stroke="#C4954A" stroke-width="0.5" opacity="0.2"/>
  <!-- Inner accent dot -->
  <circle cx="17" cy="17" r="1.8" fill="#C4954A" opacity="0.32"/>
  <!-- Small diamond on H line -->
  <rect x="26" y="-1" width="5" height="5" transform="rotate(45 28.5 1.5)" fill="none" stroke="#C4954A" stroke-width="0.5" opacity="0.3"/>
  <!-- Small diamond on V line -->
  <rect x="-1" y="26" width="5" height="5" transform="rotate(45 1.5 28.5)" fill="none" stroke="#C4954A" stroke-width="0.5" opacity="0.3"/>
</svg>
