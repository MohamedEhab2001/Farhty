# Store — farhty.online (HTTP → redirects to HTTPS after certbot)
server {
    listen 80;
    server_name farhty.online www.farhty.online;

    root /var/www/farhty/apps/store/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Admin — farhty.online/admin
# Served as a subdirectory alias of the store server block above.
# Add this location inside the store server block if you prefer one block:
#   location /admin/ {
#       alias /var/www/farhty/apps/admin/dist/;
#       try_files $uri $uri/ /index.html;
#   }

# API — api.farhty.online
server {
    listen 80;
    server_name api.farhty.online;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Required for SSE (deploy log streaming) — disable buffering
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}

# All customer subdomains — wildcard catch-all
# Serves /var/www/instances/<slug>/ for every <slug>.farhty.online
server {
    listen 80;
    server_name ~^(?<slug>.+)\.farhty\.online$;

    # Security: block slugs that try to path-traverse
    if ($slug ~ "\.\.") {
        return 403;
    }

    root /var/www/instances/$slug;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
