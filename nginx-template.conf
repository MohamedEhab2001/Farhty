# nginx-template.conf
# Reference config for farhty.online
# Full setup instructions in docs/VPS-SETUP.md
#
# Place at: /etc/nginx/sites-available/farhty
# Enable with: sudo ln -s /etc/nginx/sites-available/farhty /etc/nginx/sites-enabled/

# Store — farhty.online
server {
    listen 80;
    server_name farhty.online www.farhty.online;
    root /var/www/farhty/apps/store/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /admin {
        alias /var/www/farhty/apps/admin/dist;
        try_files $uri $uri/ /index.html;
    }
}

# API — api.farhty.online
server {
    listen 80;
    server_name api.farhty.online;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Required for SSE deploy log streaming
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}

# All customer subdomains — wildcard catches everything
# No changes needed here ever — new instances just need files in /var/www/instances/[slug]/
server {
    listen 80;
    server_name ~^(?<slug>.+)\.farhty\.online$;

    root /var/www/instances/$slug;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# NOTE: After running certbot, SSL blocks will be added automatically above.
# The wildcard cert covers farhty.online and *.farhty.online
